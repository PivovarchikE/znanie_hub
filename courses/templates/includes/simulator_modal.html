<div class="modal fade" id="resultModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title fw-bold">Тренировка завершена!</h5>
            </div>
            <div class="modal-body text-center p-4">
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="p-2 border rounded bg-light">
                            <h3 id="resSolved" class="fw-bold mb-0">0</h3>
                            <small class="text-muted">Решено</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="p-2 border rounded bg-light">
                            <h3 id="resCorrectCount" class="fw-bold text-success mb-0">0</h3>
                            <small class="text-muted">Верно</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="p-2 border rounded bg-light">
                            <h3 id="resCorrectPercent" class="fw-bold text-primary mb-0">0%</h3>
                            <small class="text-muted">Процент</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="p-2 border rounded bg-light">
                            <h3 id="resTime" class="fw-bold text-info mb-0">00:00</h3>
                            <small class="text-muted">Время</small>
                        </div>
                    </div>
                </div>
            {% if not user.is_authenticated %}
                <p class="text-muted small mt-2">Войдите, чтобы сохранять свои достижения!</p>
            {% endif %}
                <div id="detailedResults" class="text-start d-none">
                    <hr>
                    <h6 class="fw-bold">Подробный отчет:</h6>
                    <div class="table-responsive" style="max-height: 250px;">
                        <table class="table table-sm table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Пример</th>
                                    <th>Ваш ответ</th>
                                    <th>Правильный</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="detailsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0 d-flex justify-content-between">
                <button class="btn btn-link text-decoration-none" id="showDetailsBtn">Подробнее</button>
                <div class="gap-2 d-flex">
                    <button class="btn btn-outline-secondary" onclick="location.reload()">Попробовать снова</button>
                    <a href="{% url 'math_index' %}" class="btn btn-primary px-4">В меню</a>
                </div>
            </div>
        </div>
    </div>
</div>
